<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notatki</title>
    <link rel="stylesheet" href="home.css" />
    <link rel="stylesheet" href="../navbar/navbar.css" />
  </head>
  <body>
    <div class="dashboard">
      <nav class="navbar">
        <div class="nav-left">
          <button class="active" data-page="home">Główna</button>
          <button data-page="notes">Notatki</button>
          <button data-page="calendar">Kalendarz</button>
          <button data-page="day">Dziś</button>
          <!-- <button data-page="expenses">Wydatki</button> -->
        </div>
        <div class="nav-right profile-menu">
          <button id="profile-button">Profil</button>
          <div class="profile-dropdown">
            <button data-page="settings">Ustawienia</button>
            <button id="logout">Wyloguj</button>
          </div>
        </div>
      </nav>
      <script src="../navbar/navbar.js"></script>
      <main>
        <section class="welcome">
          <h1>Witaj <span id="username"> </span></h1>
          <div class="clock">
            <h2 id="time">12:34</h2>
            <p id="date">13 lipca 2026</p>
          </div>
          <button id="addNote" class="main-button">+ Dodaj notatkę</button>
        </section>
        <section class="cards">
          <div class="card">
            <h3>Notatki</h3>
            <div id="latest-note">
              <p>Brak notatek</p>
            </div>
          </div>
          <div class="card">
            <h3>Zadania</h3>
            <p>Dzisiejsze zadania</p>
          </div>
          <div class="card">
            <h3>Wydatki</h3>
            <p>0 zł</p>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="home.js"></script>
  </body>
</html>
