<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rejestracja</title>
    <script type="module" crossorigin src="/JavaScript-notes/assets/register-BLMvaWVE.js"></script>
    <link rel="modulepreload" crossorigin href="/JavaScript-notes/assets/firebase-CZxFrQus.js">
    <link rel="stylesheet" crossorigin href="/JavaScript-notes/assets/register-BIQUhJG5.css">
  </head>
  <body>
    <div class="register-box">
      <h1>Rejestracja</h1>
      <div id="errorBox" class="error-box">
        <p id="errorMessage"></p>
        <button id="errorButton">OK</button>
      </div>
      <form>
        <input id="email" type="email" placeholder="Adres e-mail" required />
        <input id="password" type="password" placeholder="Hasło" required />
        <input
          id="confirmPassword"
          type="password"
          placeholder="Powtórz hasło"
          required
        />
        <button id="registerButton" type="submit">Załóż konto</button>
      </form>
      <p class="register">
        Masz już konto?
        <a href="../index.html">Zaloguj się</a>
      </p>
    </div>
  </body>
</html>
